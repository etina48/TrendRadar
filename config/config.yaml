global:
  push_mode: incremental
  max_news_count: 100
  encoding: utf-8

platforms:
  bilibili:
    enabled: true
    mode: search
    search_limit: 50
  xiaohongshu:
    enabled: true
    mode: search
    search_limit: 50
  douyin:
    enabled: true
    mode: search
    search_limit: 40

push:
  feishu:
    enable: true

ai:
  enabled: true
  provider: openai-compatible
  api_key: ${{ secrets.AI_API_KEY }}
  api_base: "https://api.deepseek.com"
  model: "deepseek-chat"
  temperature: 0.3
  analysis_prompt_file: "config/ai_analysis_prompt.txt"
